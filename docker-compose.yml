services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
    command: >
      sh -c "mkdir -p /app/data && pip install -r requirements/prod.txt --quiet 2>/dev/null &&
             python manage.py migrate contenttypes --noinput 2>/dev/null || true &&
             python manage.py migrate auth --noinput 2>/dev/null || true &&
             python manage.py migrate sessions --noinput 2>/dev/null || true &&
             python manage.py migrate admin --noinput 2>/dev/null || true &&
             python manage.py migrate --noinput &&
             python manage.py seed_domains 2>/dev/null || true &&
             python manage.py seed_agent_profiles 2>/dev/null || true &&
             python manage.py seed_global_context 2>/dev/null || true &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
    command: >
      sh -c "mkdir -p /app/data && pip install -r requirements/prod.txt --quiet 2>/dev/null &&
             celery -A config.celery worker --loglevel=info --concurrency=2"

  worker-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
    command: >
      sh -c "mkdir -p /app/data && pip install -r requirements/prod.txt --quiet 2>/dev/null &&
             celery -A config.celery beat --loglevel=info"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sqlite_data:
